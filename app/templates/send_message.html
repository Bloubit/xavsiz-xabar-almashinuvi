{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1>Send Encrypted Message</h1>

    <form method="POST">

        <div class="form-group">

            <label>
                Receiver
            </label>

            <select name="receiver_id">

                {% for user in users %}

                    <option value="{{ user.id }}">
                        {{ user.username }}
                    </option>

                {% endfor %}

            </select>

        </div>

        <div class="form-group">

            <label>
                Message
            </label>

            <textarea
                name="content"
                rows="5"
            ></textarea>

        </div>

        <button class="btn" type="submit">
            Send
        </button>

    </form>

</div>

{% endblock %}
